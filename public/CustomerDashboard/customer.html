<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Customer Home</title>
    <link rel="stylesheet" href="customer.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="home-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                <span class="header-title">HOME</span>
            </div>
            <button class="bell-btn" aria-label="Notifications">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="notification-dot"></span>
            </button>
        </header>

        <!-- Welcome Section -->
        <section class="welcome-section">
            <h1 class="welcome-title">Hi, customer <span class="wave">👋</span></h1>
            <p class="welcome-subtitle">What would you like to do today?</p>
        </section>

        <!-- Grocery Image -->
        <div class="image-section">
            <div class="grocery-image">
                <div class="grocery-basket">
                    <div class="basket-body">
                        <div class="basket-items">
                            <div class="item bread">🥖</div>
                            <div class="item bottle">🍾</div>
                            <div class="item apple">🍎</div>
                            <div class="item carrot">🥕</div>
                            <div class="item milk">🥛</div>
                        </div>
                        <div class="basket-rim"></div>
                        <div class="basket-handle"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Menu Cards -->
        <section class="menu-section">
            <div class="menu-card">
                <div class="card-left">
                    <div class="card-icon purple">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">Profile</h3>
                        <p class="card-desc">Manage your profile</p>
                    </div>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>

            <div class="menu-card">
                <div class="card-left">
                    <div class="card-icon blue">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">Search</h3>
                        <p class="card-desc">Find stores, items or categories</p>
                    </div>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>

            <div class="menu-card">
                <div class="card-left">
                    <div class="card-icon orange">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 11l3 3L22 4"/>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                        </svg>
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">Create grocery list</h3>
                        <p class="card-desc">Make your grocery list</p>
                    </div>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>

            <div class="menu-card">
                <div class="card-left">
                    <div class="card-icon red">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                            <circle cx="12" cy="10" r="3"/>
                        </svg>
                    </div>
                    <div class="card-info">
                        <h3 class="card-title">Nearby store</h3>
                        <p class="card-desc">Find stores near you</p>
                    </div>
                </div>
                <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18l6-6-6-6"/>
                </svg>
            </div>
        </section>
    </div>
</body>
</html>

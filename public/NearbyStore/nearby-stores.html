<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nearby Stores</title>
    <link rel="stylesheet" href="nearby-stores.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <button class="back-btn" aria-label="Go back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <button class="bell-btn" aria-label="Notifications">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="notification-dot"></span>
            </button>
        </header>

        <!-- Title Section -->
        <section class="title-section">
            <h1 class="main-title">Nearby stores</h1>
            <p class="subtitle">Find stores near you</p>
        </section>

        <!-- Location Icon -->
        <div class="location-icon-wrapper">
            <div class="location-pulse">
                <div class="pulse-ring"></div>
                <div class="pulse-ring delay"></div>
                <div class="location-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Table Section -->
        <section class="table-section">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Store name</th>
                            <th>Available<br>categories</th>
                            <th>How far</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Filled rows -->
                        <tr>
                            <td class="store-cell">
                                <div class="store-info">
                                    <div class="store-badge spencer">S</div>
                                    <span class="store-name">Spencer's</span>
                                </div>
                            </td>
                            <td class="categories-cell">
                                <div class="category-tags">
                                    <span class="tag">Groceries</span>
                                    <span class="tag">Dairy</span>
                                    <span class="tag more">+3</span>
                                </div>
                            </td>
                            <td class="distance-cell">
                                <span class="distance-badge near">0.5 km</span>
                            </td>
                        </tr>
                        <tr>
                            <td class="store-cell">
                                <div class="store-info">
                                    <div class="store-badge bigbasket">B</div>
                                    <span class="store-name">BigBasket</span>
                                </div>
                            </td>
                            <td class="categories-cell">
                                <div class="category-tags">
                                    <span class="tag">Veggies</span>
                                    <span class="tag">Fruits</span>
                                    <span class="tag more">+5</span>
                                </div>
                            </td>
                            <td class="distance-cell">
                                <span class="distance-badge near">1.2 km</span>
                            </td>
                        </tr>
                        <tr>
                            <td class="store-cell">
                                <div class="store-info">
                                    <div class="store-badge dmart">D</div>
                                    <span class="store-name">D-Mart</span>
                                </div>
                            </td>
                            <td class="categories-cell">
                                <div class="category-tags">
                                    <span class="tag">Household</span>
                                    <span class="tag">Snacks</span>
                                    <span class="tag more">+2</span>
                                </div>
                            </td>
                            <td class="distance-cell">
                                <span class="distance-badge medium">3.5 km</span>
                            </td>
                        </tr>
                        <tr>
                            <td class="store-cell">
                                <div class="store-info">
                                    <div class="store-badge reliance">R</div>
                                    <span class="store-name">Reliance</span>
                                </div>
                            </td>
                            <td class="categories-cell">
                                <div class="category-tags">
                                    <span class="tag">Beverages</span>
                                    <span class="tag">Frozen</span>
                                    <span class="tag more">+4</span>
                                </div>
                            </td>
                            <td class="distance-cell">
                                <span class="distance-badge far">5.8 km</span>
                            </td>
                        </tr>
                        <!-- Empty rows -->
                        <tr class="empty-row">
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr class="empty-row">
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                        <tr class="empty-row">
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</body>
</html>

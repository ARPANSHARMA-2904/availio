<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Grocery List</title>
    <link rel="stylesheet" href="grocery-list.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <button class="back-btn" aria-label="Go back">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <button class="bell-btn" aria-label="Notifications">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                <span class="notification-dot"></span>
            </button>
        </header>

        <!-- Title Section -->
        <section class="title-section">
            <h1 class="main-title">My grocery list</h1>
        </section>

        <!-- Grocery Illustration -->
        <div class="illustration-section">
            <div class="grocery-illustration">
                <div class="clipboard">
                    <div class="clipboard-top">
                        <div class="clip"></div>
                    </div>
                    <div class="paper">
                        <div class="check-item">
                            <span class="checkbox checked">✓</span>
                            <span class="item-text">Milk</span>
                        </div>
                        <div class="check-item">
                            <span class="checkbox checked">✓</span>
                            <span class="item-text">Bread</span>
                        </div>
                        <div class="check-item">
                            <span class="checkbox"></span>
                            <span class="item-text">Eggs</span>
                        </div>
                        <div class="check-item">
                            <span class="checkbox checked">✓</span>
                            <span class="item-text">Rice</span>
                        </div>
                    </div>
                </div>
                <div class="basket">
                    <div class="basket-body">
                        <div class="basket-items">
                            <span class="basket-item">🥕</span>
                            <span class="basket-item">🍎</span>
                            <span class="basket-item">🥦</span>
                        </div>
                    </div>
                    <div class="basket-handle"></div>
                </div>
            </div>
        </div>

        <!-- Table Section -->
        <section class="table-section">
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th class="col-item">Item name</th>
                            <th class="col-check">Checklist</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="item-cell">
                                <div class="item-info">
                                    <span class="item-icon">🥛</span>
                                    <span class="item-name">Milk</span>
                                </div>
                            </td>
                            <td class="check-cell">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" checked>
                                    <span class="checkmark">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="20 6 9 17 4 12"/>
                                        </svg>
                                    </span>
                                </label>
                            </td>
                        </tr>
                        <tr>
                            <td class="item-cell">
                                <div class="item-info">
                                    <span class="item-icon">🍞</span>
                                    <span class="item-name">Bread</span>
                                </div>
                            </td>
                            <td class="check-cell">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" checked>
                                    <span class="checkmark">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="20 6 9 17 4 12"/>
                                        </svg>
                                    </span>
                                </label>
                            </td>
                        </tr>
                        <tr>
                            <td class="item-cell">
                                <div class="item-info">
                                    <span class="item-icon">🥚</span>
                                    <span class="item-name">Eggs</span>
                                </div>
                            </td>
                            <td class="check-cell">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox">
                                    <span class="checkmark">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="20 6 9 17 4 12"/>
                                        </svg>
                                    </span>
                                </label>
                            </td>
                        </tr>
                        <tr>
                            <td class="item-cell">
                                <div class="item-info">
                                    <span class="item-icon">🍚</span>
                                    <span class="item-name">Rice</span>
                                </div>
                            </td>
                            <td class="check-cell">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" checked>
                                    <span class="checkmark">
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                            <polyline points="20 6 9 17 4 12"/>
                                        </svg>
                                    </span>
                                </label>
                            </td>
                        </tr>
                        <tr class="empty-row">
                            <td></td>
                            <td></td>
                        </tr>
                        <tr class="empty-row">
                            <td></td>
                            <td></td>
                        </tr>
                        <tr class="empty-row">
                            <td></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Save Button -->
        <div class="button-section">
            <button class="save-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                    <polyline points="7 3 7 8 15 8"/>
                </svg>
                Save changes
            </button>
        </div>
    </div>
</body>
</html>
